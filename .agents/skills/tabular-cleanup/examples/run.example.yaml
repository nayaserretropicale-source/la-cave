# Example run config + contract for tabular-cleanup — ILLUSTRATIVE shape only.
# This is a generic transactions table; it deliberately does NOT match any particular dataset.
# The loop writes a filled-in copy (the confirmed contract + the compiled checklist) to
# <sandbox_root>/tcl/schema.yaml at setup time.

# --- the artifact (READ-ONLY; v0 is a copy of it) ---------------------------
artifact: ./data/transactions_dump.csv
format: csv                     # csv | tsv | parquet | xlsx | json (from extension)
read_opts:                      # detected for delimited files; omit for parquet/xlsx
  delimiter: ","
  encoding: utf-8
  header: 0
  quotechar: '"'

sandbox_root: ./sandbox         # tcl/ is created here

# --- the objective is the CHECKLIST compiled from the contract below ---------
# No dimension weights, no epsilon, no composite score. Each contract rule compiles to one
# deterministic check that reports a violation COUNT. The only tuning knob is per-column
# `severity` (priority tier). `checks_passing_pct` is a reporting headline only.
objective:
  priority: [severity_high, most_violations]   # how the next open check to attack is chosen
  headline: checks_passing_pct                  # reported for humans; NOT a control signal

# --- anti-gaming guardrails (a breach => revert regardless of violations cleared) -----
guardrails:
  retention_floor: 0.95         # cumulative unique_rows_kept / unique_rows_in_v0 (v0 deduped)
  protected_columns: ["*"]      # columns that must survive ("*" = all)
  impute_cap: 0.20              # max fraction of a column's cells that may be imputed

# --- budget (BACKSTOP only; the loop normally stops all-pass-or-residual) -----------
gate: iterations                # iterations | tokens | time
budget: 30                      # 30 iters  (or e.g. 500000 tokens / 30 minutes)

# --- the data contract (INFERRED at setup, then CONFIRMED by the user) ------
# Sole authority for "correct". Each entry compiles to one or more checks (id in []).
# NOTE: canonical categories are judged against the STORED value, so a non-canonical value
# (e.g. "Paid" vs canonical "paid") is an OPEN violation the loop must rewrite — the merge_map
# is repair guidance for that transform, NOT a check-time substitution.
contract:
  columns:
    txn_id:
      dtype: int               # [txn_id.type]
      nullable: false          # [txn_id.required]
      key: true                # [txn_id.key]  -> unique
      severity: high
    account_email:
      dtype: string
      nullable: false          # [account_email.required]
      regex: '^[^@\s]+@[^@\s]+\.[^@\s]+$'   # [account_email.regex]
      severity: high
    status:
      dtype: category
      nullable: false
      categories: [open, paid, shipped, refunded, cancelled]   # [status.categories]
      merge_map:               # variant -> canonical (repair guidance for the transform)
        "Paid": paid
        "PAID": paid
        "Shipped": shipped
        "Cancelled": cancelled
        "refund": refunded
      severity: normal
    amount:
      dtype: float             # [amount.type]
      nullable: false          # [amount.required]
      min: 0                   # [amount.range]
      outlier: {method: iqr, k: 3.0}   # [amount.outlier]  (omit / null to skip)
      severity: normal
    currency:
      dtype: category
      nullable: false
      categories: [USD, EUR, GBP, JPY]   # [currency.categories]
      severity: normal
    created_at:
      dtype: date              # [created_at.type]
      nullable: false          # [created_at.required]
      severity: normal
    closed_at:
      dtype: date
      nullable: true
      severity: normal
  cross_column_rules:
    - id: created_le_closed    # [created_le_closed]
      rule: "created_at <= closed_at"
      dimension: consistency
