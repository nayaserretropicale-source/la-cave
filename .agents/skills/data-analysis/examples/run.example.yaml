# Example config for the data-analysis loop.
# Copy/fill this in as loop.run.yaml in your working directory (see SKILL.md, Setup).

dataset: ./data/orders.csv        # data file (CSV/TSV/Parquet/…) — read-only ground truth
question: "what drives order value?"  # optional analysis focus; omit to explore broadly
report: ./sandbox/findings.md     # output findings file
analysis_cmd: python3             # interpreter for analysis snippets
sandbox_root: ./sandbox           # snippets + ledger live here
budget: 8                         # max iterations
patience: 2                       # stop after N iterations with no new verified finding
