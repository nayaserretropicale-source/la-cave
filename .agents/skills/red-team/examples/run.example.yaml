# Example config for the red-team loop.
# Copy/fill this in as loop.run.yaml in your working directory (see SKILL.md "Setup").

# The system under test: reads one input on stdin, prints a verdict. Never edited.
target_cmd: "python3 ./guardrail.py"
# Ground truth for the same input: prints the *correct* verdict. A failure is target != oracle.
oracle_cmd: "python3 ./policy_oracle.py"

candidates_file: ./sandbox/candidates.jsonl   # each round's candidates: {id, text, class}
failures_log: ./sandbox/failures.jsonl        # append-only log of confirmed failures

sandbox_root: ./sandbox   # candidates, failures, ledger live here
budget: 8                 # max rounds
patience: 2               # stop after N consecutive rounds with no new failure class

# The harness is invoked each round (see SKILL.md "Setup"); <skill_dir> is where this skill is
# installed, e.g. ~/.claude/skills/red-team:
#   python3 <skill_dir>/tools/harness.py --target "python3 ./guardrail.py" \
#     --oracle "python3 ./policy_oracle.py" --inputs ./sandbox/candidates.jsonl \
#     --log ./sandbox/failures.jsonl
