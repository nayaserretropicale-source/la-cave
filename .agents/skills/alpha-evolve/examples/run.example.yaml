# Example bindings for alpha-evolve.
# The loop writes a filled-in copy to ./loop.run.yaml at setup time (and mirrors it into
# <sandbox_root>/lae/ as the run's checkpoint of resolved bindings).

# --- standard bindings ------------------------------------------------------
metric: val_acc
metric_direction: maximize    # minimize or maximize

run_cmd: "/path/to/venv/bin/python train.py"     # the evaluator h: one training run -> <metric>
entrypoint: "/path/to/venv/bin/python train.py"

editable_files:               # the "program" being evolved (NOT the eval harness)
  - model.py
  - config.yaml

sandbox_root: ./sandbox
gate: epochs
budget: 5                     # per FULL training run (epochs, or minutes if gate: time)

# --- evolve config ----------------------------------------------------------
evolve:
  # CORE — the only two values the user fills in:
  total_budget: 40            # total FULL training runs to spend (or minutes). num_generations = ceil(total_budget / concurrency).
  concurrency: auto           # parallel evaluations C; auto from the hardware probe (confirm/override at setup).

  # cascade is DERIVED from `budget` (not configured): smoke = ~1 epoch/subset, full = budget,
  #   gate = child's smoke metric >= parent's smoke metric.

  # ADVANCED — faithful defaults; only filled in if the user opts into the advanced branch at setup:
  advanced:
    num_islands: 4
    num_top: 3                # best programs shown as inspiration in the prompt
    num_diverse: 2            # diverse programs shown as inspiration
    num_bins: 10              # MAP-Elites bins per axis
    migration_interval: 5     # generations between ring migrations
    diversity_reference_size: 10   # sample size for the diversity edit-distance
    pop_per_island: 40        # archive cap per island
    seed: 42                  # RNG seed (reproducibility anchor)
    # axes are fixed: complexity (log param count) x diversity (avg edit-distance to a reference sample); fitness = metric
