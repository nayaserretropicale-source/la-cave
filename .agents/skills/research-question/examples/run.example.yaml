# Example config for the research-question loop.
# Copy/fill this in as loop.run.yaml in your working directory (see SKILL.md Setup).

# --- the artifact ------------------------------------------------------------
topic: >
  How sleep affects learning and memory in adults — interested in timing effects and
  practical study schedules.

# --- delivery + passing bar --------------------------------------------------
n_questions: 3           # how many strong questions to deliver
pass_threshold: 75       # 0-100; a question is strong at total >= this AND no axis scored 1

# --- novelty check (see SKILL Setup) -----------------------------------------
novelty_check: lit       # lit (shared literature-search skill) | web (WebSearch/WebFetch) | none

# --- plumbing ----------------------------------------------------------------
report: ./sandbox/questions.md
sandbox_root: ./sandbox
budget: 8                # max iterations

# Literature toolchain (only used when novelty_check: lit). lit_skill_dir is the installed
# location of the sibling `literature-search` skill; the tool lives at tools/lit_search.py
# under it; lit_py is any Python >=3.9.
lit_skill_dir: ~/.claude/skills/literature-search
lit_py: python3
